name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Package release
        run: |
          mkdir -p dist
          tar -czf dist/edge-favorites-mcp-${{ github.ref_name }}.tar.gz \
            --exclude=node_modules --exclude=.git --exclude=dist \
            -C . .
          cd . && npm ci --omit=dev
          tar -czf dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.tar.gz \
            --exclude=.git --exclude=dist \
            -C . .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/edge-favorites-mcp-${{ github.ref_name }}.tar.gz
            dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.tar.gz
