name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Package release
        run: |
          mkdir -p release-dist
          tar -czf release-dist/edge-favorites-mcp-${{ github.ref_name }}.tar.gz \
            --exclude=node_modules --exclude=.git --exclude=release-dist \
            -C . .
          npm ci --omit=dev
          tar --dereference -czf release-dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.tar.gz \
            --exclude=.git --exclude=release-dist \
            -C . .
          zip -r release-dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.zip \
            . -x ".git/*" "release-dist/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-dist/edge-favorites-mcp-${{ github.ref_name }}.tar.gz
            release-dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.tar.gz
            release-dist/edge-favorites-mcp-${{ github.ref_name }}-bundled.zip
